{% extends "base.html" %}
{% block content %}
<div class="card p-4 mx-auto" style="max-width: 400px;">
    <h2 class="fw-bold mb-3">Sign In</h2>
    <form method="POST">
        <div class="mb-2">
            <label class="small text-muted form-label mb-1">Email Address</label>
            <input type="email" name="email" placeholder="name@example.com" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="small text-muted form-label mb-1">Account Password</label>
            <input type="password" name="password" placeholder="Enter password" class="form-control" minlength="8" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 mb-3 py-2">Secure Login</button>
    </form>
    
    <div class="text-center border-top pt-3">
        <p class="mb-0 text-muted small">Don't have an account setup yet?</p>
        <a href="{{ url_for('register') }}" class="text-decoration-none fw-bold">Register Here</a>
    </div>
</div>
{% endblock %}
